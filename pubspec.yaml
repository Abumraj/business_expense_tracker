name: bet
description: "Business Expense Tracker - Manage your income, expenses, and customers efficiently."
publish_to: "none"
version: 1.0.0+2

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  animate_do: ^3.3.4
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3
  flutter_spinkit: ^5.2.1
  flutter_svg: ^2.0.10+1
  fluttertoast: ^8.2.8
  intl: ^0.19.0
  http: ^1.2.2
  shared_preferences: ^2.2.3
  pdf: ^3.10.8
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/logo.png"
  android_12:
    image: "assets/images/logo.png"
    color: "#FFFFFF"
  ios_content_mode: "center"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
